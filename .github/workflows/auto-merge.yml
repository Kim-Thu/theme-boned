name: 🤖 Auto-Merge Approved PRs

on:
    pull_request:
        types: [labeled, synchronize]
        branches: [main]

jobs:
    auto-merge:
        runs-on: ubuntu-latest
        if: |
            github.event.pull_request.mergeable == true &&
            contains(github.event.pull_request.labels.*.name, 'auto-merge')

        steps:
            - name: 🔍 Check all required statuses
              uses: actions/github-script@v7
              with:
                  script: |
                      const { data: checks } = await github.rest.checks.listForRef({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        ref: context.payload.pull_request.head.sha
                      });

                      const allPassed = checks.check_runs.every(run => 
                        run.conclusion === 'success' || run.conclusion === 'skipped'
                      );

                      if (!allPassed) {
                        core.setFailed('Not all checks passed');
                        return;
                      }

                      console.log('✅ All checks passed, proceeding to merge...');

            - name: 🔄 Enable auto-merge
              run: |
                  gh pr merge ${{ github.event.pull_request.number }} \
                    --repo ${{ github.repository }} \
                    --squash \
                    --auto
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
